<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Mind Maze 2048 – The Arena</title>
  <meta name="description" content="Welcome to Mind Maze 2048 - The ultimate college event puzzle challenge." />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body class="landing-body">

  <div class="landing-container">
    <header class="hero-section">
      <h1 class="logo hero-logo">Mind Maze<br /><span>2048</span></h1>
      <p class="hero-tagline">Strategy meets Speed in the Ultimate Puzzle Arena</p>
    </header>

    <main class="action-grid">
      <a href="player.html" class="glass-card action-card player-card">
        <div class="card-icon">🎮</div>
        <div class="card-content">
          <h2>Enter Arena</h2>
          <p>Join the competition, test your skills, and climb the leaderboard.</p>
          <span class="btn btn-primary">Join Game</span>
        </div>
      </a>

      <a href="admin.html" class="glass-card action-card admin-card">
        <div class="card-icon">🛠</div>
        <div class="card-content">
          <h2>Event Console</h2>
          <p>Manage participants, control the timer, and monitor live results.</p>
          <span class="btn btn-secondary">Admin Access</span>
        </div>
      </a>
    </main>

    <footer class="landing-footer">
      <p>&copy; 2026 College Event Management System</p>
    </footer>
  </div>

  <div class="bg-glow"></div>
